<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TalonEye — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#ff2e4d;--yellow:#ffd60a;--blue:#2ea3ff;--green:#2ee66b;--purple:#b14dff;--ink:#eef1ff;--dim:#9aa0d4;--line:rgba(120,130,255,.22);--rgb:linear-gradient(90deg,#ff2e4d,#ffd60a 33%,#2ee66b 55%,#2ea3ff 78%,#b14dff);--pixel:'Press Start 2P',monospace;--body:'Nunito',system-ui,sans-serif}
body{font-family:var(--body);background:#05040f;color:var(--ink);overflow-x:hidden;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}a{color:inherit;text-decoration:none}
#space{position:fixed;inset:0;z-index:-3;display:block;width:100%;height:100%;transition:background .5s ease}
#crt{position:fixed;inset:0;z-index:60;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.2) 3px,transparent 4px)}
#crt::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 50% 50%,transparent 60%,rgba(0,0,0,.55))}
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(9,7,26,.98),rgba(9,7,26,.92));border-bottom:3px solid var(--blue);box-shadow:0 6px 0 rgba(0,0,0,.4)}
.hud{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:12px 18px 10px;flex-wrap:wrap}
.logo{font-family:var(--pixel);font-size:15px;color:var(--yellow);text-shadow:0 0 14px rgba(255,214,10,.5);white-space:nowrap}.logo b{color:var(--red)}
.logo .mk{display:inline-block;width:26px;height:26px;vertical-align:middle;margin-right:8px;border-radius:6px;object-fit:cover}
.sub{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.hud-spacer{flex:1}.hud-stat{display:flex;align-items:center;gap:8px;font-family:var(--pixel);font-size:10px;padding:7px 11px;border-radius:6px;background:rgba(18,14,46,.7);border:2px solid var(--line)}
#score{color:var(--yellow)}.coin{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff6b0,var(--yellow) 45%,#f0a000);border:2px solid #7a5200;display:grid;place-items:center;color:#7a5200;font-weight:900;animation:spin 2.4s linear infinite}
@keyframes spin{to{transform:rotateY(360deg)}}.lives{display:flex;gap:5px}.heart{color:var(--red);animation:beat 1.1s infinite}@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.28)}30%{transform:scale(1)}}
nav{max-width:1240px;margin:0 auto;padding:0 12px 12px}.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{position:relative;white-space:nowrap;font-family:var(--pixel);font-size:10px;padding:13px 14px;border-radius:6px 6px 0 0;color:var(--dim);background:rgba(255,255,255,.02);border:2px solid transparent;transition:.2s}
.tab:hover{color:#fff;transform:translateY(-2px)}.tab.active{color:#fff;background:linear-gradient(180deg,rgba(46,163,255,.18),transparent)}
.tab.active::after{content:"";position:absolute;left:8%;right:8%;bottom:-3px;height:4px;background:var(--rgb);border-radius:3px;box-shadow:0 0 10px rgba(46,163,255,.9)}
.marquee{overflow:hidden;white-space:nowrap;border-top:2px solid var(--line);background:linear-gradient(90deg,rgba(255,46,77,.1),rgba(46,163,255,.1))}
.marquee .tk{display:inline-block;padding:7px 0;animation:mq 26s linear infinite;font-family:var(--pixel);font-size:9px;color:var(--yellow)}.marquee .tk span{margin:0 26px}@keyframes mq{to{transform:translateX(-50%)}}
main{max-width:1240px;margin:0 auto;padding:30px 18px 80px}.section{display:none;animation:sin .4s ease}.section.active{display:block}@keyframes sin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.s-title{font-family:var(--pixel);font-size:clamp(15px,3.4vw,24px);color:#fff;text-shadow:3px 3px 0 #c20019}.s-title .em{color:var(--yellow);text-shadow:3px 3px 0 #7a5200}
.s-kick{font-family:var(--pixel);font-size:9px;color:var(--blue);margin-bottom:6px}
.divider{height:14px;margin:14px 0 26px;background-image:linear-gradient(90deg,var(--red) 0 25%,transparent 0),linear-gradient(90deg,var(--yellow) 0 25%,transparent 0),linear-gradient(90deg,var(--blue) 0 25%,transparent 0);background-size:48px 4px;background-position:0 4px,16px 9px,32px 4px;background-repeat:repeat-x;opacity:.85}
.grid{display:grid;gap:22px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.card{position:relative;border-radius:10px;overflow:hidden;background:rgba(14,11,38,.86);border:2px solid var(--line);display:flex;flex-direction:column;transition:.22s}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--rgb);z-index:3}
.card:hover{transform:translateY(-10px) scale(1.02);border-color:var(--red);box-shadow:0 18px 40px rgba(0,0,0,.55),0 0 14px rgba(255,46,77,.6)}
.art{height:140px;display:grid;place-items:center;font-size:62px;background:linear-gradient(135deg,#1b1840,#13112b);border-bottom:2px solid var(--line);overflow:hidden}
.art .em{animation:flt 4s ease-in-out infinite}@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.art img{width:100%;height:100%;object-fit:cover;display:block}
.card .body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
.genre{align-self:flex-start;font-family:var(--pixel);font-size:8px;color:var(--blue);padding:5px 8px;border-radius:4px;background:rgba(46,163,255,.12);border:1px solid rgba(46,163,255,.4)}
.card h3{font-family:var(--pixel);font-size:13px;line-height:1.6;color:#fff}.desc{font-size:14px;color:var(--dim)}
.tags{display:flex;flex-wrap:wrap;gap:6px}.tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;background:rgba(177,77,255,.14);color:#dabcff;border:1px solid rgba(177,77,255,.35)}
.c-meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto}.stars{color:var(--yellow);font-size:15px}.stars .e{color:rgba(255,255,255,.18)}
.badge{font-family:var(--pixel);font-size:8px;padding:5px 8px;border-radius:4px;border:1px solid}
.cta{margin-top:4px;align-self:flex-start;font-family:var(--pixel);font-size:10px;color:#0a0a0a;padding:11px 14px;border-radius:6px;background:linear-gradient(180deg,var(--yellow),#f0a000);border:2px solid #7a5200;box-shadow:0 4px 0 #7a5200}
.cta .ar{display:inline-block;margin-left:6px;animation:bx 1s ease-in-out infinite}@keyframes bx{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
/* featured layout */
.card.featured{grid-column:1/-1;flex-direction:row}
.card.featured .art{height:auto;width:42%;min-height:230px;border-bottom:none;border-right:2px solid var(--line);font-size:96px}
.card.featured .body{flex:1}
@media(max-width:680px){.card.featured{flex-direction:column}.card.featured .art{width:100%;height:160px;border-right:none;border-bottom:2px solid var(--line)}}
.about{display:grid;grid-template-columns:330px 1fr;gap:30px;align-items:start}
.pcard{position:sticky;top:160px;background:rgba(14,11,38,.86);border:2px solid var(--blue);border-radius:12px;padding:26px 22px;text-align:center;overflow:hidden}
.pcard::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--rgb)}
.avatar{width:120px;height:120px;border-radius:50%;display:grid;place-items:center;font-size:58px;margin:8px auto 14px;background:radial-gradient(circle at 40% 35%,#1b1840,#0a0820);border:3px solid var(--yellow);box-shadow:0 0 16px rgba(255,214,10,.5);overflow:hidden;animation:flt 4.5s ease-in-out infinite}
.avatar img{width:100%;height:100%;object-fit:cover}
.pname{font-family:var(--pixel);font-size:15px;color:#fff}.pclass{font-family:var(--pixel);font-size:9px;color:var(--yellow);margin-top:10px}.plvl{display:inline-block;margin-top:12px;font-family:var(--pixel);font-size:8px;color:#0a0a0a;background:var(--yellow);padding:5px 9px;border-radius:4px}
.stat-row{margin-top:14px;text-align:left}.stat-top{display:flex;justify-content:space-between;font-family:var(--pixel);font-size:8px;color:var(--dim);margin-bottom:6px}.stat-top .v{color:var(--yellow)}
.bar{height:14px;background:rgba(0,0,0,.45);border:2px solid var(--line);border-radius:8px;overflow:hidden}.bar .fill{height:100%;width:0;border-radius:6px;background:var(--rgb);transition:width 1.4s cubic-bezier(.2,.8,.2,1)}
.aright{display:flex;flex-direction:column;gap:26px}.panel{position:relative;background:rgba(14,11,38,.86);border:2px solid var(--line);border-radius:12px;padding:24px}.panel::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--rgb);border-radius:12px 12px 0 0}
.panel h2{font-family:var(--pixel);font-size:14px;color:#fff;margin-bottom:16px}.lore{font-size:16px;color:#d8ddff}.lore+.lore{margin-top:12px}
.skills{display:flex;flex-wrap:wrap;gap:9px}.skills .tag{font-size:12px;background:rgba(46,163,255,.14);color:#bfe1ff;border:1px solid rgba(46,163,255,.4);padding:6px 12px}
.ach{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px}.trophy{text-align:center;padding:16px 10px;border-radius:10px;background:linear-gradient(180deg,rgba(255,214,10,.1),rgba(0,0,0,.2));border:2px solid rgba(255,214,10,.45)}
.tico{font-size:34px}.tname{font-family:var(--pixel);font-size:8px;color:var(--yellow);margin-top:10px;line-height:1.6}.tdesc{font-size:11px;color:var(--dim);margin-top:6px}
.contacts{display:flex;flex-wrap:wrap;gap:12px}.btn{font-family:var(--pixel);font-size:10px;padding:14px 18px;border-radius:6px}.btn.primary{color:#0a0a0a;background:linear-gradient(90deg,var(--red),var(--yellow))}.btn.ghost{color:var(--blue);border:2px solid var(--blue);background:rgba(46,163,255,.08)}
footer{border-top:3px solid var(--line);margin-top:40px;padding:26px 18px 40px;text-align:center;background:rgba(5,4,15,.6)}footer .fl{font-family:var(--pixel);font-size:9px;color:var(--dim);line-height:1.9}footer .fl b{color:var(--blue)}
@media(max-width:900px){.about{grid-template-columns:1fr}.pcard{position:static}}
</style>
</head>
